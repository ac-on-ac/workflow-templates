name: Reusable Terraform Static Analysis Workflow

permissions:
  contents: read

on:
  workflow_call:
    inputs:
      working_directory:
        description: "Directory to run static analysis against (defaults to repository root)"
        required: false
        type: string
        default: "."

jobs:
  terraform-format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Run terraform format check
        working-directory: ${{ inputs.working_directory }}
        run: terraform fmt -check -recursive

  tflint:
    needs: [terraform-format]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install tflint
        run: |
          curl -sSLo tflint.zip https://github.com/terraform-linters/tflint/releases/download/v0.61.0/tflint_linux_amd64.zip
          unzip tflint.zip
          chmod +x tflint
          mkdir -p $HOME/bin
          mv tflint $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Initialise tflint plugins
        working-directory: ${{ inputs.working_directory }}
        run: tflint --init
        env:
          # Passed to avoid GitHub API rate-limiting when tflint downloads plugins
          GITHUB_TOKEN: ${{ github.token }}

      - name: Run tflint
        working-directory: ${{ inputs.working_directory }}
        run: |
          root_dir=$(pwd)
          find . -type f -name "*.tf" \
            ! -path "*/tests/*" \
            ! -path "*/.terraform/*" \
            ! -path "*/examples/*" \
            -exec dirname {} \; | sort -u | while IFS= read -r dir; do
            echo "Running tflint in: $dir"
            tflint --chdir "$dir" --config "${root_dir}/.tflint.hcl"
          done

  checkov:
    needs: [tflint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install checkov
        run: pip3 install checkov

      - name: Run checkov
        working-directory: ${{ inputs.working_directory }}
        run: checkov -d . --framework terraform
