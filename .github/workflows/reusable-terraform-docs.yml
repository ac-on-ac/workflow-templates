name: Reusable Terraform Docs Workflow

# Add permissions to allow writing to the repository
permissions:
  contents: write
  pull-requests: write

on:
  workflow_call:
    inputs:
      terraform_docs_config_file:
        description: "Path to the terraform-docs config file"
        required: false
        type: string
        default: ".terraform-docs.yml"
      working_directory:
        description: "Directory to generate docs in (defaults to repository root)"
        required: false
        type: string
        default: "."
    secrets:
      token:
        # Optional. Defaults to GITHUB_TOKEN.
        # A PAT is no longer required for CI re-triggering — the workflow uses
        # http.extraheader for git credentials (replicating actions/checkout@v2
        # behaviour), which bypasses GitHub's loop-prevention detection so
        # downstream workflows fire normally on the docs commit.
        # Pass a PAT only if GITHUB_TOKEN lacks sufficient repository access
        # (e.g. certain private-repo configurations).
        description: >
          GitHub token used to check out and push to the repository.
          Defaults to GITHUB_TOKEN. A PAT is not required for CI re-triggering.
          Pass one only if GITHUB_TOKEN lacks sufficient repository access.
        required: false

jobs:
  terraform-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}
          token: ${{ secrets.token || github.token }}
          # persist-credentials: false prevents checkout@v6 from embedding the
          # token in the remote URL (https://x-access-token:TOKEN@github.com/...).
          # URL-embedded credentials trigger GitHub's loop-prevention, which
          # suppresses workflow runs on the resulting commit. We configure
          # credentials manually below using http.extraheader instead, which
          # replicates actions/checkout@v2 behaviour and does not trigger
          # loop-prevention — so CI re-fires on the docs commit without a PAT.
          persist-credentials: false

      - name: Configure git credentials
        run: |
          ENCODED=$(echo -n "x-access-token:${TOKEN}" | base64 | tr -d '\n')
          git config --global http.https://github.com/.extraheader "AUTHORIZATION: basic ${ENCODED}"
        env:
          TOKEN: ${{ secrets.token || github.token }}

      - name: Install terraform-docs
        run: |
          curl -sSLo ./terraform-docs.tar.gz https://terraform-docs.io/dl/v0.20.0/terraform-docs-v0.20.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz
          chmod +x terraform-docs
          mkdir -p $HOME/bin
          mv terraform-docs $HOME/bin
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Generate README.md files
        run: |
          cd ${{ inputs.working_directory }}
          terraform-docs -c ${{ inputs.terraform_docs_config_file }} .

      - name: Remove terraform-docs.tar.gz from repository and runner
        run: |
          # Remove from repository if present
          if git ls-files --error-unmatch terraform-docs.tar.gz > /dev/null 2>&1; then
            git rm terraform-docs.tar.gz
          fi
          # Remove from runner filesystem (current dir and $HOME)
          rm -f terraform-docs.tar.gz
          rm -f $HOME/terraform-docs.tar.gz

      - name: Commit and push documentation changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only markdown files that terraform-docs might have created
          git add '*.md'

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update documentation files"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}
